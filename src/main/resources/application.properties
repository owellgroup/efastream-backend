# Application
spring.application.name=efastream-backend

# Server
server.port=8080
server.servlet.context-path=/api

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/efastream
spring.datasource.username=postgres
spring.datasource.password=Kalimbwejoel
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Mail (SMTP)
spring.mail.host=mail.simplyfound.com.na
spring.mail.port=587
#
spring.mail.username=efastream@simplyfound.com.na
spring.mail.password=EfaStream1234
spring.mail.from=efastream@simplyfound.com.na
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=mail.simplyfound.com.na
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.debug=false

# JWT
jwt.secret=${JWT_SECRET:5351db4b2b971cc425d660b0ea09952fc5ca02bb4e9dfc3f77a34f154e549b17}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Payment gateway: STRIPE, PAYPAL, FLUTTERWAVE, or PAYSTACK
payment.gateway=STRIPE
payment.stripe.api-key=${STRIPE_API_KEY:sk_test_xxx}
payment.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_xxx}
payment.paypal.client-id=${PAYPAL_CLIENT_ID:xxx}
payment.paypal.client-secret=${PAYPAL_CLIENT_SECRET:xxx}
payment.paypal.mode=sandbox

# App
app.frontend-url=http://localhost:3000
app.email-verification-expiration-hours=24
app.password-reset-expiration-hours=1
app.logo-url=https://www.efastream.com/assets/logo-D4CxNzNq.png
app.subscription-expiring-days-warning=3

# Logging
logging.level.root=INFO
logging.level.com.efastream=DEBUG
logging.level.org.springframework.security=DEBUG
